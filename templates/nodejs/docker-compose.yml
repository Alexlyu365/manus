# =============================================================================
# Node.js 网站模板（轻量化版 v2）
# 适用: Next.js / Express / Nuxt 等 Node.js 应用
# 内存占用: ~80-128MB
# =============================================================================

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: site_${SITE_NAME}:latest
    container_name: site_${SITE_NAME}
    restart: unless-stopped
    expose:
      - "${APP_PORT:-3000}"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    networks:
      - npm_network
      - site_internal
    environment:
      - NODE_ENV=production
      - PORT=${APP_PORT:-3000}
      - TZ=Asia/Shanghai
      - DB_HOST=${DB_HOST:-manus-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASS=${DB_PASS:-}
    env_file:
      - .env
    mem_limit: 128m
    memswap_limit: 256m
    cpus: '0.5'
    security_opt:
      - no-new-privileges:true
    labels:
      - "manus.site=${DOMAIN}"
      - "manus.type=nodejs"

networks:
  npm_network:
    external: true
  site_internal:
    name: site_${SITE_NAME}_internal
    driver: bridge
