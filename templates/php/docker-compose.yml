# =============================================================================
# PHP 网站模板（轻量化版 v2）
# 适用: Laravel / WordPress / 原生 PHP 应用
# 内存占用: nginx ~20MB + php-fpm ~60MB = ~80MB
# =============================================================================

services:
  web:
    image: nginx:alpine
    container_name: site_${SITE_NAME}_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./html:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - npm_network
      - site_internal
    depends_on:
      - php
    mem_limit: 32m
    memswap_limit: 32m
    cpus: '0.2'
    security_opt:
      - no-new-privileges:true
    labels:
      - "manus.site=${DOMAIN}"
      - "manus.type=php"

  php:
    image: php:8.2-fpm-alpine
    container_name: site_${SITE_NAME}_php
    restart: unless-stopped
    volumes:
      - ./html:/var/www/html
      - ./uploads:/var/www/uploads
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./logs/php:/var/log/php
    networks:
      - site_internal
    environment:
      - TZ=Asia/Shanghai
      - DB_HOST=${DB_HOST:-manus-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASS=${DB_PASS:-}
    env_file:
      - .env
    mem_limit: 96m
    memswap_limit: 192m
    cpus: '0.5'
    security_opt:
      - no-new-privileges:true

networks:
  npm_network:
    external: true
  site_internal:
    name: site_${SITE_NAME}_internal
    driver: bridge
