version: '3.8'

# ============================================================
# 静态网站模板（产品展示 / 图片展示 / 视频展示）
# 支持大文件：图片、视频（默认最大 500MB）
# ============================================================

services:
  web:
    image: nginx:alpine
    container_name: site_${SITE_NAME}
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    networks:
      - npm_network
      - site_internal
    environment:
      - TZ=Asia/Shanghai
    labels:
      - "manus.site=${DOMAIN}"
      - "manus.type=static"

networks:
  npm_network:
    external: true
  site_internal:
    name: site_${SITE_NAME}_internal
    driver: bridge
