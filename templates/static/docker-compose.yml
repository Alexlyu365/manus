version: '3.8'

# =============================================================================
# 静态网站模板（安全加固版）
# 适用: 产品展示、图片展示、视频展示等纯静态网站
# 安全修订: SEC-08 资源限制、非 root 用户、expose 替代 ports
# =============================================================================

services:
  web:
    image: nginx:alpine
    container_name: site_${SITE_NAME}
    restart: unless-stopped
    # 安全说明: 使用 expose 而非 ports
    # expose 仅在 Docker 内部网络暴露端口，不映射到宿主机
    # 通过 Nginx Proxy Manager 内部网络反代，避免端口直接暴露
    expose:
      - "80"
    volumes:
      - ./html:/usr/share/nginx/html:ro          # 只读挂载，防止容器写入网站文件
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/usr/share/nginx/html/uploads  # 上传目录（可写）
      - ./logs:/var/log/nginx
    networks:
      - npm_network
      - site_internal
    environment:
      - TZ=Asia/Shanghai
    # SEC-08: 资源限制，防止单站点耗尽服务器资源
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 32M
    # 安全选项
    security_opt:
      - no-new-privileges:true    # 防止容器内进程提升权限
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "manus.site=${DOMAIN}"
      - "manus.type=static"

networks:
  npm_network:
    external: true
  site_internal:
    name: site_${SITE_NAME}_internal
    driver: bridge
