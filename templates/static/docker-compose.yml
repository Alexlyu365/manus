# =============================================================================
# 静态网站模板（轻量化版 v2）
# 适用: 产品展示、图片展示、视频展示等纯静态网站
# 内存占用: ~20MB（nginx:alpine 极轻量）
# =============================================================================

services:
  web:
    image: nginx:alpine
    container_name: site_${SITE_NAME}
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/usr/share/nginx/html/uploads
      - ./logs:/var/log/nginx
    networks:
      - npm_network
      - site_internal
    environment:
      - TZ=Asia/Shanghai
    mem_limit: 64m
    memswap_limit: 64m
    cpus: '0.25'
    security_opt:
      - no-new-privileges:true
    labels:
      - "manus.site=${DOMAIN}"
      - "manus.type=static"

networks:
  npm_network:
    external: true
  site_internal:
    name: site_${SITE_NAME}_internal
    driver: bridge
